  <style>
    :root {
      --bg:           #f4f3f0;
      --text:         #1a1a1a;
      --text-muted:   #909090;
      --border:       rgba(26, 26, 26, 0.1);
      --font-display: 'DM Sans', system-ui, sans-serif;
      --font-body:    'Urbanist', system-ui, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background-color: var(--bg);
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      font-weight: 400;
      color: var(--text);
      background-color: var(--bg);
      min-height: 100vh;
      min-height: 100dvh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img { display: block; max-width: 100%; }

    /* ── Header ────────────────────────────────────────────── */
    .page-header {
      display: flex;
      justify-content: center;
      padding: clamp(28px, 5vw, 44px) 24px 0;
    }

    .header-logo-link {
      opacity: 0.4;
      transition: opacity 0.28s;
      line-height: 0;
    }

    .header-logo-link:hover { opacity: 1; }

    .header-logo-link img { width: 14px; }

    /* ── Main ──────────────────────────────────────────────── */
    .release-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(44px, 7vw, 64px) clamp(20px, 6vw, 48px) 80px;
    }

    /* ── Artwork ───────────────────────────────────────────── */
    .artwork-wrap {
      width: min(300px, 72vw);
      margin-bottom: 32px;
    }

    .artwork-wrap img {
      width: 100%;
      height: auto;
      box-shadow: 0 16px 56px rgba(0, 0, 0, 0.15), 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    /* ── Release info ──────────────────────────────────────── */
    .release-info {
      text-align: center;
      margin-bottom: 48px;
    }

    .release-title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(24px, 5.5vw, 36px);
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--text);
      margin-bottom: 12px;
    }

    .release-artists {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      line-height: 1.8;
    }

    /* ── Platform list ─────────────────────────────────────── */
    .platform-list {
      list-style: none;
      width: 100%;
      max-width: 440px;
      margin-bottom: 64px;
    }

    .platform-list li:first-child .platform-link {
      border-top: 1px solid var(--border);
    }

    .platform-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.03em;
      color: var(--text);
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .platform-link:hover { color: var(--text-muted); }

    .pl-icon {
      width: 24px;
      font-size: 17px;
      color: var(--text-muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pl-name { flex: 1; }

    .pl-arrow {
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.4;
      font-family: var(--font-body);
    }

    /* ── Music Video section ───────────────────────────────── */
    .mv-section {
      width: 100%;
      max-width: 440px;
    }

    .mv-section-header {
      display: flex;
      margin-bottom: clamp(20px, 3vw, 28px);
      border-bottom: 1px solid var(--border);
    }

    .mv-section-label {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      color: var(--text);
      padding: 10px 0;
      border-bottom: 1.5px solid var(--text);
      margin-bottom: -1px;
    }

    .mv-embed {
      position: relative;
      aspect-ratio: 16 / 9;
      width: 100%;
      background-color: rgba(26, 26, 26, 0.05);
    }

    .mv-embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Footer ────────────────────────────────────────────── */
    .page-footer {
      text-align: center;
      padding: 52px 24px 40px;
    }

    .page-footer a {
      font-family: var(--font-body);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .page-footer a:hover { color: var(--text); }

    /* ── Fade-in on load ───────────────────────────────────── */
    .fade-up {
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.8s ease forwards;
    }

    .fade-up:nth-child(1) { animation-delay: 0.05s; }
    .fade-up:nth-child(2) { animation-delay: 0.15s; }
    .fade-up:nth-child(3) { animation-delay: 0.25s; }
    .fade-up:nth-child(4) { animation-delay: 0.35s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .fade-up { animation: none; opacity: 1; transform: none; }
    }
  </style>
</head>
