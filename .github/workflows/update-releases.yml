name: Update Spotify Releases

# ── When this runs ───────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 3 * * *'   # Daily at 3 AM UTC (noon JST)
  workflow_dispatch:       # Manual trigger from GitHub → Actions tab
  push:
    branches: [main]
    paths-ignore:
      - 'data/releases-spotify.js'   # Don't loop on its own commits
      - 'data/releases-manual.js'

# ── Setup required (one-time) ────────────────────────────────────────────────
# 1. Go to https://developer.spotify.com/dashboard → Create app
#    (any name, e.g. "phritz website"; redirect URI can be http://localhost)
# 2. Note the Client ID and Client Secret
# 3. In your GitHub repo → Settings → Secrets and variables → Actions → New secret:
#      SPOTIFY_CLIENT_ID     ← paste Client ID
#      SPOTIFY_CLIENT_SECRET ← paste Client Secret
# 4. In your GitHub repo → Settings → Actions → General →
#    Workflow permissions → select "Read and write permissions" → Save
#
# After that, new Spotify releases will appear on your site within 24 hours
# automatically, or instantly when you click "Run workflow" in the Actions tab.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  update-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch releases from Spotify API
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python3 scripts/fetch_releases.py

      - name: Commit and push if releases changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/releases-spotify.js
          # Only commit if there's actually a diff
          git diff --cached --quiet && echo "No changes." || \
            git commit -m "chore: update Spotify releases [skip ci]" && git push
