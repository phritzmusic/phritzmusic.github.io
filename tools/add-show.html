<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>add show — phritz tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f4f3f0;
      --text:    #1a1a1a;
      --muted:   #909090;
      --border:  rgba(26,26,26,0.12);
      --font:    'Jost', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px 80px;
    }

    h1 {
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: lowercase;
      color: var(--muted);
      margin-bottom: 48px;
    }

    .card { width: 100%; max-width: 560px; }

    .field { margin-bottom: 24px; }

    label {
      display: block;
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: lowercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="url"],
    input[type="date"],
    input[type="password"] {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 0 10px;
      font-family: var(--font);
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      border-radius: 0;
    }

    input:focus { border-bottom-color: var(--text); }
    input::placeholder { color: var(--muted); }

    .row { display: flex; gap: 24px; }
    .row .field { flex: 1; }

    .note {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.7;
    }

    /* ── GitHub settings ───────────────────────────────────────── */
    .gh-section {
      margin-top: 32px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .gh-section summary {
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: lowercase;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
    }
    .gh-section summary::-webkit-details-marker { display: none; }
    .gh-section summary::after {
      content: '›';
      transition: transform 0.2s;
      font-size: 12px;
    }
    .gh-section[open] summary::after { transform: rotate(90deg); }
    .gh-section[open] summary { margin-bottom: 20px; }

    .token-status {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin-left: 4px;
      vertical-align: middle;
    }
    .token-status.saved { background: #5a9; }

    /* ── Buttons ───────────────────────────────────────────────── */
    button {
      font-family: var(--font);
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: lowercase;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, border-color 0.2s, opacity 0.2s;
    }
    button:disabled { opacity: 0.45; cursor: default; }

    .btn-group { display: flex; gap: 12px; margin-top: 36px; }

    .btn-primary {
      flex: 1;
      background: var(--text);
      color: var(--bg);
      border: 1px solid var(--text);
      font-size: 10px;
      padding: 14px 20px;
    }
    .btn-primary:not(:disabled):hover { background: #333; border-color: #333; }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      padding: 14px 20px;
    }
    .btn-ghost:not(:disabled):hover { border-color: var(--text); color: var(--text); }

    /* ── Divider ───────────────────────────────────────────────── */
    .divider {
      width: 100%;
      max-width: 560px;
      height: 1px;
      background: var(--border);
      margin: 48px 0;
    }

    /* ── Output ────────────────────────────────────────────────── */
    .output-section { width: 100%; max-width: 560px; display: none; }
    .output-section.visible { display: block; }

    .output-label {
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: lowercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* Preview row */
    .preview-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      padding: 16px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .preview-main {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .preview-act  { font-weight: 400; font-size: 11px; letter-spacing: 2px; text-transform: lowercase; }
    .preview-title { font-weight: 300; font-size: 11px; letter-spacing: 1.5px; text-transform: lowercase; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .preview-details { display: flex; align-items: baseline; gap: 20px; flex-shrink: 0; }
    .preview-date, .preview-venue { font-size: 10px; letter-spacing: 2px; color: var(--muted); white-space: nowrap; }
    .preview-tickets { font-size: 9px; letter-spacing: 2px; text-transform: lowercase; color: var(--muted); border-bottom: 1px solid currentColor; padding-bottom: 1px; white-space: nowrap; text-decoration: none; }

    /* Code box */
    .code-box {
      position: relative;
      background: rgba(26,26,26,0.04);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 16px;
    }
    pre {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre;
      overflow-x: auto;
    }
    .btn-copy {
      position: absolute;
      top: 12px; right: 12px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 9px;
      padding: 6px 12px;
    }
    .btn-copy:hover { border-color: var(--text); color: var(--text); }
    .btn-copy.copied { color: var(--text); border-color: var(--text); }

    /* Action row under code box */
    .action-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-push {
      flex: 1;
      background: var(--text);
      color: var(--bg);
      border: 1px solid var(--text);
      font-size: 10px;
      padding: 13px 20px;
    }
    .btn-push:not(:disabled):hover { background: #333; border-color: #333; }
    .btn-push.success { background: #3a7a55; border-color: #3a7a55; }
    .btn-push.error   { background: #a04040; border-color: #a04040; }

    .push-status {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--muted);
      flex: 1;
    }
  </style>
</head>
<body>

  <h1>phritz · add show</h1>

  <div class="card">

    <div class="row">
      <div class="field">
        <label for="f-act">artist name</label>
        <input type="text" id="f-act" placeholder="phritz" value="phritz">
      </div>
      <div class="field">
        <label for="f-title">show title</label>
        <input type="text" id="f-title" placeholder="Flux">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="f-date">date</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label for="f-venue">venue</label>
        <input type="text" id="f-venue" placeholder="SPREAD, Shimokitazawa">
      </div>
    </div>

    <div class="field">
      <label for="f-tickets">ticket url <span style="letter-spacing:1px;opacity:.55">(optional)</span></label>
      <input type="url" id="f-tickets" placeholder="https://...">
    </div>

    <!-- GitHub settings (collapsible) -->
    <details class="gh-section" id="gh-section">
      <summary>
        github settings
        <span class="token-status" id="token-status"></span>
      </summary>

      <div class="field">
        <label for="f-token">personal access token</label>
        <input type="password" id="f-token" placeholder="ghp_...">
        <p class="note">
          Needs <strong>repo</strong> (or <strong>public_repo</strong>) write scope.<br>
          Saved to browser localStorage — never leaves your machine.
        </p>
      </div>
    </details>

    <div class="btn-group">
      <button class="btn-primary" onclick="generate()">generate snippet</button>
      <button class="btn-ghost"   onclick="clearAll()">clear</button>
    </div>

  </div>

  <!-- ── Output ─────────────────────────────────────────────────── -->
  <div class="output-section" id="output-section">

    <div class="divider"></div>

    <p class="output-label">preview</p>

    <div class="preview-row">
      <div class="preview-main">
        <span class="preview-act"   id="p-act"></span>
        <span class="preview-title" id="p-title"></span>
      </div>
      <div class="preview-details">
        <span class="preview-date"    id="p-date"></span>
        <span class="preview-venue"   id="p-venue"></span>
        <a    class="preview-tickets" id="p-tickets" style="display:none" href="#" target="_blank" rel="noopener">tickets →</a>
      </div>
    </div>

    <p class="output-label">html snippet</p>

    <div class="code-box">
      <pre id="code-output"></pre>
      <button class="btn-copy" id="btn-copy" onclick="copyCode()">copy</button>
    </div>

    <div class="action-row">
      <button class="btn-push" id="btn-push" onclick="pushToWebsite()">push to website →</button>
      <span class="push-status" id="push-status"></span>
    </div>

  </div>

  <script>
    /* ── Helpers ──────────────────────────────────────────────── */
    const REPO   = 'phritzmusic/phritzmusic.github.io';
    const BRANCH = 'master';
    const PATH   = 'index.html';
    const TOKEN_KEY = 'phritz_gh_token';

    function formatDate(raw) {
      if (!raw) return '';
      const [y, m, d] = raw.split('-');
      return `${y} · ${m} · ${d}`;
    }

    function esc(str) {
      return str
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Unicode-safe base64
    function toB64(str)   { return btoa(unescape(encodeURIComponent(str))); }
    function fromB64(b64) { return decodeURIComponent(escape(atob(b64.replace(/\n/g, '')))); }

    /* ── Token persistence ───────────────────────────────────── */
    function loadToken() {
      try { return localStorage.getItem(TOKEN_KEY) || ''; } catch { return ''; }
    }
    function saveToken(t) {
      try { localStorage.setItem(TOKEN_KEY, t); } catch {}
    }

    function updateTokenStatus() {
      const saved = loadToken();
      const dot   = document.getElementById('token-status');
      const input = document.getElementById('f-token');
      if (saved) {
        dot.classList.add('saved');
        if (!input.value) input.value = saved;
      } else {
        dot.classList.remove('saved');
      }
    }

    /* ── Splice: inject show row into index.html string ─────── */
    function splicePanel(html, snippet) {
      const MARKER = '<div id="panel-live"';
      const si = html.indexOf(MARKER);
      if (si === -1) return null;

      const tagEnd = html.indexOf('>', si) + 1;

      // Walk forward to find the matching </div>
      let depth = 1, i = tagEnd;
      while (i < html.length && depth > 0) {
        const o = html.indexOf('<div', i);
        const c = html.indexOf('</div>', i);
        if (c === -1) break;
        if (o !== -1 && o < c) { depth++; i = o + 4; }
        else { depth--; if (depth > 0) i = c + 6; else i = c; }
      }

      // Inner content of the panel
      let inner = html.slice(tagEnd, i);

      // Remove "no dates" placeholder if present
      inner = inner.replace(/[ \t]*<p class="shows-none">[\s\S]*?<\/p>\n?/g, '');

      // Indent snippet to match file style (8-space outer indent)
      const PAD = '        ';
      const indented = snippet.trim().split('\n')
        .map(line => PAD + line)
        .join('\n');

      return html.slice(0, tagEnd)
           + '\n' + indented
           + inner
           + html.slice(i);
    }

    /* ── Generate snippet ───────────────────────────────────── */
    function generate() {
      const act     = document.getElementById('f-act').value.trim();
      const title   = document.getElementById('f-title').value.trim();
      const rawDate = document.getElementById('f-date').value;
      const venue   = document.getElementById('f-venue').value.trim();
      const tickets = document.getElementById('f-tickets').value.trim();

      if (!act || !rawDate || !venue) {
        alert('Please fill in artist name, date, and venue.');
        return;
      }

      const dateStr = formatDate(rawDate);

      // Update preview
      document.getElementById('p-act').textContent   = act;
      document.getElementById('p-title').textContent = title ? `— ${title}` : '';
      document.getElementById('p-date').textContent  = dateStr;
      document.getElementById('p-venue').textContent = venue;
      const pTickets = document.getElementById('p-tickets');
      if (tickets) { pTickets.style.display = 'inline'; pTickets.href = tickets; }
      else          { pTickets.style.display = 'none'; }

      // Build snippet (2-space indent, consistent throughout)
      const titleLine   = title   ? `\n    <span class="show-title">— ${esc(title)}</span>`                                                             : '';
      const ticketLine  = tickets ? `\n    <a class="show-tickets" href="${esc(tickets)}" target="_blank" rel="noopener noreferrer">tickets →</a>` : '';

      const snippet =
`<div class="show-row">
  <div class="show-main">
    <span class="show-act">${esc(act)}</span>${titleLine}
  </div>
  <div class="show-details">
    <span class="show-date">${esc(dateStr)}</span>
    <span class="show-venue">${esc(venue)}</span>${ticketLine}
  </div>
</div>`;

      document.getElementById('code-output').textContent = snippet;

      // Reset state
      document.getElementById('push-status').textContent = '';
      const pushBtn = document.getElementById('btn-push');
      pushBtn.textContent = 'push to website →';
      pushBtn.className   = 'btn-push';
      pushBtn.disabled    = false;

      const copyBtn = document.getElementById('btn-copy');
      copyBtn.textContent = 'copy';
      copyBtn.classList.remove('copied');

      document.getElementById('output-section').classList.add('visible');
      document.getElementById('output-section')
        .scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Copy snippet ───────────────────────────────────────── */
    function copyCode() {
      navigator.clipboard.writeText(document.getElementById('code-output').textContent)
        .then(() => {
          const btn = document.getElementById('btn-copy');
          btn.textContent = 'copied ✓';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
        });
    }

    /* ── Push to website via GitHub Contents API ────────────── */
    async function pushToWebsite() {
      const tokenInput = document.getElementById('f-token').value.trim() || loadToken();
      if (!tokenInput) {
        document.getElementById('gh-section').open = true;
        document.getElementById('f-token').focus();
        setStatus('add your github token above first', false);
        return;
      }
      saveToken(tokenInput);
      updateTokenStatus();

      const snippet = document.getElementById('code-output').textContent;
      if (!snippet) { setStatus('generate a snippet first', false); return; }

      const btn = document.getElementById('btn-push');
      btn.textContent = 'pushing…';
      btn.disabled    = true;
      setStatus('');

      const API = `https://api.github.com/repos/${REPO}/contents/${PATH}`;
      const headers = {
        Authorization: `Bearer ${tokenInput}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      };

      try {
        // 1. Fetch current file
        const getRes = await fetch(`${API}?ref=${BRANCH}`, { headers });
        if (!getRes.ok) {
          const err = await getRes.json().catch(() => ({}));
          throw new Error(`GitHub API ${getRes.status}: ${err.message || getRes.statusText}`);
        }
        const fileData  = await getRes.json();
        const sha       = fileData.sha;
        const currentHtml = fromB64(fileData.content);

        // 2. Inject new show row
        const updatedHtml = splicePanel(currentHtml, snippet);
        if (!updatedHtml) throw new Error('#panel-live not found in index.html');

        // 3. Build commit message
        const act     = document.getElementById('f-act').value.trim();
        const title   = document.getElementById('f-title').value.trim();
        const rawDate = document.getElementById('f-date').value;
        const commitMsg = `add show: ${act}${title ? ' — ' + title : ''} (${formatDate(rawDate)})`;

        // 4. Commit
        const putRes = await fetch(API, {
          method: 'PUT',
          headers,
          body: JSON.stringify({
            message: commitMsg,
            content: toB64(updatedHtml),
            sha,
            branch: BRANCH,
          }),
        });

        if (!putRes.ok) {
          const err = await putRes.json().catch(() => ({}));
          throw new Error(`Commit failed ${putRes.status}: ${err.message || putRes.statusText}`);
        }

        btn.textContent = 'pushed ✓';
        btn.className   = 'btn-push success';
        setStatus('live on phritzmusic.com in ~30 s');
        setTimeout(() => {
          btn.textContent = 'push to website →';
          btn.className   = 'btn-push';
          btn.disabled    = false;
        }, 5000);

      } catch (err) {
        btn.textContent = 'push to website →';
        btn.className   = 'btn-push';
        btn.disabled    = false;
        setStatus(`error: ${err.message}`, false);
        console.error(err);
      }
    }

    function setStatus(msg, ok = true) {
      const el = document.getElementById('push-status');
      el.textContent = msg;
      el.style.color = ok ? 'var(--muted)' : '#a04040';
    }

    /* ── Clear ──────────────────────────────────────────────── */
    function clearAll() {
      document.getElementById('f-act').value     = 'phritz';
      document.getElementById('f-title').value   = '';
      document.getElementById('f-date').value    = '';
      document.getElementById('f-venue').value   = '';
      document.getElementById('f-tickets').value = '';
      document.getElementById('output-section').classList.remove('visible');
      setStatus('');
    }

    /* ── Enter key ──────────────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.id !== 'f-token') generate();
    });

    /* ── Init ───────────────────────────────────────────────── */
    updateTokenStatus();
  </script>

</body>
</html>
